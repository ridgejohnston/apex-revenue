<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password · Apex Revenue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0a0a14;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 40px 36px;
      width: 380px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    .icon { font-size: 32px; text-align: center; margin-bottom: 10px; }
    h1 { font-size: 20px; font-weight: 700; text-align: center; letter-spacing: -0.3px; }
    .sub { font-size: 12px; color: #6b7280; text-align: center; margin-top: 4px; margin-bottom: 28px; }
    .msg {
      display: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      text-align: center;
    }
    .msg.error   { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .msg.success { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #7c3aed; }
    button {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.2px;
      margin-top: 4px;
      transition: opacity .2s;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Set New Password</h1>
    <p class="sub">Apex Revenue · Password Reset</p>
    <div id="msg" class="msg"></div>
    <label for="pw1">New Password</label>
    <input id="pw1" type="password" placeholder="At least 8 characters" autocomplete="new-password">
    <label for="pw2">Confirm Password</label>
    <input id="pw2" type="password" placeholder="Repeat password" autocomplete="new-password">
    <button id="btn">Update Password</button>
  </div>
  <script src="recovery.js"></script>
</body>
</html>
