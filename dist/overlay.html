<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apex Revenue Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
  --border: rgba(255,255,255,0.07); --accent: #ff3f6c; --accent2: #ff8c42;
  --gold: #ffd166; --green: #06d6a0; --text: #f0eeff; --muted: #6e6d85;
}
html, body { width:100%; height:100%; overflow:hidden; background:#0a0a0f; font-family:'Manrope',sans-serif; color:var(--text); }
#overlay-shell { display:flex; flex-direction:column; width:100%; height:100%; background:var(--bg); border-radius:14px; overflow:hidden; box-shadow:0 24px 80px rgba(0,0,0,0.9),0 0 0 1px rgba(255,255,255,0.07); }
#drag-handle { display:flex; align-items:center; justify-content:space-between; padding:7px 12px; background:linear-gradient(135deg,#0e0e18,#15101f); border-bottom:1px solid var(--border); cursor:grab; user-select:none; flex-shrink:0; }
#drag-handle:active { cursor:grabbing; }
.handle-left { display:flex; align-items:center; gap:8px; }
.handle-logo { height:22px; width:auto; }
.handle-title { font-family:'Syne',sans-serif; font-weight:800; font-size:11px; color:var(--text); }
.live-badge { display:flex; align-items:center; gap:4px; background:rgba(255,63,108,0.12); border:1px solid rgba(255,63,108,0.3); border-radius:20px; padding:2px 7px; font-size:8px; font-weight:700; letter-spacing:1.5px; color:var(--accent); }
.live-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); animation:pulse 1.4s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
.handle-controls { display:flex; align-items:center; gap:6px; }
.ctrl-btn { width:18px; height:18px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; transition:all 0.15s; flex-shrink:0; }
.ctrl-btn.minimize { background:rgba(255,209,102,0.2); color:var(--gold); border:1px solid rgba(255,209,102,0.3); }
.ctrl-btn.close { background:rgba(255,63,108,0.2); color:var(--accent); border:1px solid rgba(255,63,108,0.3); }
.ctrl-btn:hover { transform:scale(1.15); filter:brightness(1.3); }
#overlay-content { flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-width:thin; scrollbar-color:rgba(255,63,108,0.3) transparent; }
.bottom-nav { display:flex; background:var(--surface); border-top:1px solid var(--border); padding:6px 0 4px; flex-shrink:0; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:8px; font-weight:600; letter-spacing:0.5px; color:var(--muted); gap:3px; cursor:pointer; transition:color 0.15s; }
.nav-item.active { color:var(--accent); }
.nav-item:hover { color:var(--text); }
.nav-icon { font-size:15px; }
body.minimised #overlay-content, body.minimised .bottom-nav { display:none; }
body.minimised #overlay-shell { height:auto; }
</style>
</head>
<body>
<div id="overlay-shell">
  <div id="drag-handle">
    <div class="handle-left">
      <img class="handle-logo" id="logo-img" src="" alt="">
      <span class="handle-title">CREATOR INTELLIGENCE</span>
    </div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="handle-controls">
      <button class="ctrl-btn minimize" id="btn-minimize">–</button>
      <button class="ctrl-btn close" id="btn-close">✕</button>
    </div>
  </div>
  <div id="overlay-content"></div>
  <div class="bottom-nav">
    <div class="nav-item active" data-page="live"><div class="nav-icon">⚡</div>Live</div>
    <div class="nav-item" data-page="analytics"><div class="nav-icon">📊</div>Analytics</div>
    <div class="nav-item" data-page="fans"><div class="nav-icon">💜</div>Fans</div>
    <div class="nav-item" data-page="settings"><div class="nav-icon">⚙️</div>Settings</div>
    <div class="nav-item" data-page="help"><div class="nav-icon">❓</div>Help</div>
  </div>
</div>

<!--
  PostHog Session Replay Integration (v0.6.0)
  Load order:
    1. posthog.js        — full PostHog IIFE library (sets window.posthog)
    2. posthog-init.js   — patches recorder loader, calls posthog.init()
    3. overlay.js        — main overlay UI logic
-->
<script src="posthog.js"></script>
<script src="posthog-init.js"></script>
<script src="overlay.js"></script>
</body>
</html>
